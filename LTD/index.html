<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LTD - Projeto de Estação</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #e0f2fe, #f8fafc);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #0f5f8f, #1f7fb4);
      color: white;
      text-align: center;
      padding: 32px 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
    }

    header h1 {
      font-size: 28px;
      line-height: 1.3;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 45px 16px;
    }

    .graficos-container {
      width: 100%;
      max-width: 1120px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
    }

    .grafico-card {
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
      transition: 0.3s;
    }

    .grafico-card:hover {
      transform: translateY(-6px);
    }

    .grafico-card h2 {
      text-align: center;
      margin-bottom: 14px;
      color: #0f5f8f;
      font-size: 22px;
    }

    .grafico-card iframe {
      width: 100%;
      height: 280px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      display: block;
    }

    footer {
      background: #111827;
      text-align: center;
      padding: 20px 12px;
    }

    footer a {
      color: white;
      background: #1f7fb4;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    footer a:hover {
      background: #0f5f8f;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 21px;
      }

      main {
        align-items: flex-start;
        padding: 28px 12px;
      }

      .graficos-container {
        grid-template-columns: 1fr;
      }

      .grafico-card {
        padding: 14px;
      }

      .grafico-card iframe {
        height: 260px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>LTD - Projeto de Estação Laboratório Transformação Digital</h1>
  </header>

  <main>
    <section class="graficos-container">
      <div class="grafico-card">
        <h2>Umidade do Solo</h2>
        <iframe
          src="https://thingspeak.com/channels/3391105/charts/1?bgcolor=%23ffffff&color=%23d62020&dynamic=true&results=60&title=solo&type=line">
        </iframe>
      </div>

      <div class="grafico-card">
        <h2>Temperatura</h2>
        <iframe
          src="https://thingspeak.com/channels/3391105/charts/2?bgcolor=%23ffffff&color=%23d62020&dynamic=true&results=60&title=temperatura&type=line">
        </iframe>
      </div>
    </section>
  </main>

  <footer>
    <a href="desenvolvedores.html">Ver desenvolvedores</a>
  </footer>
</body>
</html>
